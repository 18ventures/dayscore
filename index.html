<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Board</title>
<meta name="theme-color" content="#2B5FA8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Board">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
  :root{
    --paper:#FAFAF7; --paper-line:#E7E3D8; --ink:#1C1C1E; --ink-soft:#63625D; --ink-faint:#A5A29A;
    --marker-blue:#2B5FA8; --marker-green:#2E8B4F; --marker-red:#C0453A; --card:#FFFFFF;
    --shadow: 0 1px 2px rgba(28,28,30,0.06), 0 4px 14px rgba(28,28,30,0.05); --radius: 14px;
  }
  body.dark{
    --paper:#17181C; --paper-line:#2A2B30; --ink:#F1F0ED; --ink-soft:#B5B3AC; --ink-faint:#6E6D68;
    --card:#212226; --marker-blue:#6C9BDE; --marker-green:#5FBE84; --marker-red:#E28880;
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 4px 14px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(circle at 1px 1px, var(--paper-line) 1px, transparent 1px) 0 0/22px 22px, var(--paper);
    color:var(--ink); font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif; min-height:100vh;
    -webkit-font-smoothing:antialiased; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
    transition: background-color 0.2s ease, color 0.2s ease;
  }
  .wrap{ max-width:560px; margin:0 auto; padding:28px 18px 100px; }
  header{ margin-bottom:22px; }
  .header-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .header-actions{ display:flex; gap:8px; flex-shrink:0; }
  .eyebrow{ font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--marker-blue); font-weight:600; margin:0 0 4px; }
  h1{ font-family:'Kalam', cursive; font-size:38px; line-height:1; margin:0 0 6px; color:var(--ink); }
  .sub{ font-size:14px; color:var(--ink-soft); margin:0; }
  .sync-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--ink-faint); margin-right:5px; vertical-align:middle; }
  .sync-dot.live{ background:var(--marker-green); }
  .sync-status{ font-size:12px; color:var(--ink-faint); margin-top:8px; }
  .theme-toggle, .search-toggle{ width:40px; height:40px; flex-shrink:0; margin-top:2px; }
  .theme-toggle svg, .search-toggle svg{ width:18px; height:18px; }
  .search-toggle.active{ border-color:var(--marker-blue); }

  .streak-strip{ display:flex; gap:7px; margin-top:12px; }
  .streak-day{ display:flex; flex-direction:column; align-items:center; gap:4px; font-size:9px; color:var(--ink-faint); font-weight:600; }
  .streak-dot{ width:11px; height:11px; border-radius:50%; background:var(--paper-line); border:1.5px solid var(--paper-line); transition: background 0.15s ease; }
  .streak-dot.filled{ background:var(--marker-green); border-color:var(--marker-green); }
  .streak-dot.today{ box-shadow:0 0 0 2px var(--marker-blue); }

  .search-row{ display:none; margin:14px 0 -6px; }
  .search-row.open{ display:block; }
  .search-row input{ width:100%; padding:11px 14px; border-radius:var(--radius); border:1.5px solid var(--paper-line); background:var(--card); font-size:14px; font-family:inherit; color:var(--ink); outline:none; box-shadow:var(--shadow); }
  .search-row input:focus{ border-color:var(--marker-blue); }

  .duration-row{ display:flex; gap:8px; margin:18px 0 10px; }
  .duration-pill{ flex:1; padding:9px 4px; border-radius:10px; border:1.5px solid var(--paper-line); background:var(--card); font-family:inherit; font-size:12.5px; font-weight:700; color:var(--ink-soft); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; transition:border-color 0.12s ease, color 0.12s ease; }
  .duration-pill span{ font-size:10px; font-weight:500; color:var(--ink-faint); }
  .duration-pill.active{ border-color:var(--marker-blue); color:var(--marker-blue); }
  .duration-pill.active span{ color:var(--marker-blue); }
  .duration-pill.full{ opacity:0.5; }

  .add-row{ display:flex; gap:8px; margin:14px 0 18px; }
  .add-row input[type="text"]{ flex:1; padding:13px 14px; border-radius:var(--radius); border:1.5px solid var(--paper-line); background:var(--card); font-size:15px; font-family:inherit; color:var(--ink); outline:none; box-shadow:var(--shadow); }
  .add-row input[type="text"]:focus{ border-color:var(--marker-blue); }
  .icon-btn{ width:46px; height:46px; border-radius:var(--radius); border:1.5px solid var(--paper-line); background:var(--card); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; box-shadow:var(--shadow); transition:transform 0.12s ease, border-color 0.12s ease; }
  .icon-btn:active{ transform:scale(0.94); }
  .icon-btn:hover{ border-color:var(--marker-blue); }
  .icon-btn.primary{ background:var(--marker-blue); border-color:var(--marker-blue); }
  .icon-btn.primary svg{ stroke:#fff; }
  .icon-btn svg{ stroke:var(--ink); width:20px; height:20px; }
  #camera-input{ display:none; }

  .focus-card{ background:linear-gradient(135deg, var(--marker-blue), #4477c4); color:#fff; border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:var(--shadow); }
  .focus-label{ display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; opacity:0.9; margin-bottom:10px; }
  .focus-label svg{ width:13px; height:13px; fill:#FFD866; stroke:#FFD866; }
  .focus-row{ display:flex; align-items:center; gap:12px; }
  .focus-row .check{ width:26px; height:26px; border-radius:50%; border:2px solid rgba(255,255,255,0.7); flex-shrink:0; cursor:pointer; position:relative; }
  .focus-row .check svg{ position:absolute; top:50%; left:50%; width:15px; height:15px; transform:translate(-50%,-50%); stroke:#fff; opacity:0.9; }
  .focus-text-wrap{ flex:1; min-width:0; }
  .focus-text{ font-size:17px; font-weight:600; cursor:text; word-break:break-word; }
  .focus-card .countdown{ color:rgba(255,255,255,0.85); font-size:12px; margin-top:2px; font-weight:600; }
  .focus-card .countdown.warning{ color:#FFE58A; }
  .focus-card .countdown.overdue{ color:#FFC2BD; }
  .focus-card .edit-input{ background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.5); color:#fff; font-size:17px; font-weight:600; border-radius:8px; padding:5px 9px; width:100%; font-family:inherit; outline:none; }
  .focus-unpin{ width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.18); cursor:pointer; flex-shrink:0; }
  .focus-unpin svg{ width:13px; height:13px; stroke:#fff; }

  .task-list{ display:flex; flex-direction:column; gap:8px; }
  .task-outer{ position:relative; border-radius:var(--radius); overflow:hidden; }
  .swipe-bg{ position:absolute; inset:0; display:flex; align-items:center; gap:8px; padding:0 20px; font-size:13px; font-weight:700; color:#fff; }
  .swipe-bg svg{ width:16px; height:16px; }
  .swipe-bg.complete{ background:var(--marker-green); justify-content:flex-start; }
  .swipe-bg.delete{ background:var(--marker-red); justify-content:flex-end; }
  .task{ position:relative; z-index:1; touch-action:pan-y; display:flex; align-items:flex-start; gap:8px; background:var(--card); border-radius:var(--radius); padding:14px 12px; box-shadow:var(--shadow); animation:rise 0.22s ease; transition: background-color 0.2s ease; }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
  .task.sortable-ghost{ opacity:1; }
  .task.sortable-chosen{ box-shadow:var(--shadow); }
  .task.pending{ opacity:0.6; }
  .task.warning{ background:#FFF7DD; }
  body.dark .task.warning{ background:#3A331A; }
  .task.overdue{ background:#FDEBEA; }
  body.dark .task.overdue{ background:#3A2020; }

  .drag-handle{ width:30px; height:40px; margin:-8px -6px -8px -8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:grab; touch-action:none; color:var(--ink-faint); }
  .drag-handle svg{ width:13px; height:13px; }
  .done .drag-handle{ visibility:hidden; }

  .check{ width:24px; height:24px; border-radius:50%; border:2px solid var(--ink-faint); flex-shrink:0; cursor:pointer; margin-top:1px; position:relative; transition:border-color 0.15s ease, background 0.15s ease; }
  .check:hover{ border-color:var(--marker-green); }
  .check svg{ position:absolute; top:50%; left:50%; width:14px; height:14px; transform:translate(-50%,-50%) scale(0); stroke:#fff; transition:transform 0.18s cubic-bezier(.34,1.56,.64,1); }
  .task.done .check{ background:var(--marker-green); border-color:var(--marker-green); }
  .task.done .check svg{ transform:translate(-50%,-50%) scale(1); }
  .task-text-wrap{ flex:1; display:flex; flex-direction:column; gap:2px; min-width:0; }
  .task-text{ font-size:15.5px; line-height:1.4; padding-top:1px; word-break:break-word; cursor:text; }
  .task.done .task-text{ color:var(--ink-faint); text-decoration:line-through; text-decoration-color:var(--marker-green); text-decoration-thickness:2px; }
  .pending-label{ font-size:11px; color:var(--marker-blue); font-weight:600; }
  .countdown{ font-size:11.5px; font-weight:600; color:var(--ink-faint); }
  .countdown.warning{ color:#B8860B; }
  .countdown.overdue{ color:var(--marker-red); }
  .task-meta{ display:flex; align-items:center; gap:8px; }
  .subtasks{ margin-top:6px; display:flex; flex-direction:column; gap:5px; }
  .subtask-row{ display:flex; align-items:center; gap:8px; }
  .subtask-check{ width:16px; height:16px; border-radius:50%; border:1.5px solid var(--ink-faint); flex-shrink:0; cursor:pointer; position:relative; }
  .subtask-check svg{ position:absolute; top:50%; left:50%; width:10px; height:10px; transform:translate(-50%,-50%) scale(0); stroke:#fff; transition:transform 0.15s ease; }
  .subtask-check.done{ background:var(--marker-green); border-color:var(--marker-green); }
  .subtask-check.done svg{ transform:translate(-50%,-50%) scale(1); }
  .subtask-text{ font-size:13px; color:var(--ink-soft); flex:1; word-break:break-word; }
  .subtask-text.done{ color:var(--ink-faint); text-decoration:line-through; text-decoration-color:var(--marker-green); }
  .subtask-del{ width:16px; height:16px; display:flex; align-items:center; justify-content:center; color:var(--ink-faint); opacity:0; cursor:pointer; flex-shrink:0; }
  .subtask-row:hover .subtask-del{ opacity:1; }
  @media (hover:none){ .subtask-del{ opacity:1; } }
  .subtask-del svg{ width:11px; height:11px; }
  .subtask-add{ background:transparent; border:none; color:var(--marker-blue); font-size:12px; font-weight:600; cursor:pointer; padding:2px 0; text-align:left; font-family:inherit; }
  .subtask-input{ font-size:13px; font-family:inherit; color:var(--ink); background:var(--paper); border:1px solid var(--marker-blue); border-radius:6px; padding:3px 7px; outline:none; width:100%; }
  .duration-tag{ font-size:10px; font-weight:700; color:var(--ink-faint); background:transparent; border:1px solid var(--paper-line); border-radius:6px; padding:1px 6px; cursor:pointer; font-family:inherit; }
  .duration-tag:hover{ border-color:var(--marker-blue); color:var(--marker-blue); }
  .focus-card .duration-tag{ border-color:rgba(255,255,255,0.4); color:rgba(255,255,255,0.85); }
  mark{ background:rgba(43,95,168,0.18); color:inherit; border-radius:3px; padding:0 1px; }
  body.dark mark{ background:rgba(108,155,222,0.28); }
  .edit-input{ width:100%; font-size:15.5px; line-height:1.4; font-family:inherit; color:var(--ink); background:var(--paper); border:1px solid var(--marker-blue); border-radius:8px; padding:4px 8px; outline:none; }
  .task-pin{ width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; color:var(--ink-faint); opacity:0; transition:opacity 0.15s ease, color 0.15s ease; margin-top:1px; }
  .task-pin svg{ width:15px; height:15px; }
  .task-pin:hover{ color:#D69A00; }
  .task:hover .task-pin{ opacity:1; }
  @media (hover:none){ .task-pin{ opacity:1; } }
  .task-del{ width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; color:var(--ink-faint); opacity:0; transition:opacity 0.15s ease, background 0.15s ease, color 0.15s ease; margin-top:1px; }
  .task:hover .task-del{ opacity:1; }
  @media (hover:none){ .task-del{ opacity:1; } }
  .task-del:hover{ background:#FBEAE8; color:var(--marker-red); }
  .task-del svg{ width:14px; height:14px; }

  .done-toggle{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer; padding:6px 2px; user-select:none; }
  .done-toggle svg{ width:14px; height:14px; transition:transform 0.18s ease; }
  .done-toggle.open svg{ transform:rotate(90deg); }
  .done-list{ display:none; flex-direction:column; gap:8px; margin-top:10px; }
  .done-list.open{ display:flex; }

  .empty{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty svg{ stroke:var(--ink-faint); margin-bottom:10px; }
  .empty .t{ font-family:'Kalam', cursive; font-size:20px; color:var(--ink); margin-bottom:4px; }
  .empty .s{ font-size:14px; }

  .overlay{ position:fixed; inset:0; background:rgba(28,28,30,0.45); display:none; align-items:flex-end; justify-content:center; z-index:50; }
  .overlay.open{ display:flex; }
  @media (min-width:640px){ .overlay{ align-items:center; } }
  .modal{ background:var(--paper); width:100%; max-width:520px; max-height:82vh; border-radius:20px 20px 0 0; padding:22px 20px calc(20px + env(safe-area-inset-bottom)); overflow-y:auto; animation:slideUp 0.22s ease; }
  @media (min-width:640px){ .modal{ border-radius:20px; } }
  @keyframes slideUp{ from{ transform:translateY(30px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .modal h2{ font-family:'Kalam', cursive; font-size:24px; margin:0 0 4px; }
  .modal .m-sub{ font-size:13px; color:var(--ink-soft); margin:0 0 16px; }
  .review-item{ display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--paper-line); }
  .review-item input[type="checkbox"]{ width:18px; height:18px; accent-color:var(--marker-blue); margin-top:2px; flex-shrink:0; }
  .review-item input[type="text"]{ flex:1; border:none; background:transparent; font-family:inherit; font-size:14.5px; color:var(--ink); outline:none; padding:2px 0; }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }
  .btn{ flex:1; padding:13px; border-radius:12px; border:none; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer; }
  .btn.ghost{ background:transparent; border:1.5px solid var(--paper-line); color:var(--ink-soft); }
  .btn.solid{ background:var(--marker-blue); color:#fff; }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .loading-state{ display:flex; flex-direction:column; align-items:center; gap:12px; padding:30px 10px; color:var(--ink-soft); font-size:14px; text-align:center; }
  .spinner{ width:26px; height:26px; border:2.5px solid var(--paper-line); border-top-color:var(--marker-blue); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .error-banner{ background:#FBEAE8; color:var(--marker-red); font-size:13px; padding:10px 14px; border-radius:10px; margin-bottom:14px; }

  .toast-slot{ position:fixed; left:0; right:0; bottom:calc(20px + env(safe-area-inset-bottom)); display:flex; justify-content:center; z-index:60; pointer-events:none; padding:0 18px; }
  .toast{ pointer-events:auto; background:var(--ink); color:var(--paper); padding:11px 16px; border-radius:11px; font-size:13.5px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow); animation:toastIn 0.18s ease; }
  body.dark .toast{ background:var(--card); color:var(--ink); border:1px solid var(--paper-line); }
  .toast button{ background:transparent; border:none; color:#8FBBFF; font-weight:700; font-size:13.5px; cursor:pointer; padding:0; flex-shrink:0; }
  body.dark .toast button{ color:var(--marker-blue); }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }

  .confetti-piece{ position:absolute; top:-10px; }
  @keyframes confetti-fall{ 0%{ transform:translateY(0) rotate(0deg); opacity:0.95; } 100%{ transform:translateY(100vh) rotate(560deg); opacity:0; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <div>
        <p class="eyebrow">Board</p>
        <h1>Everything, off your head.</h1>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="stats-toggle" title="Lane stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        </button>
        <button class="icon-btn search-toggle" id="search-toggle" title="Search tasks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle dark mode"></button>
      </div>
    </div>
    <p class="sub">Add it here. Tick it off when it's done.</p>
    <p class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Connecting…</span><span id="today-count-text"></span></p>
    <div class="streak-strip" id="streak-strip"></div>
    <div class="search-row" id="search-row">
      <input type="text" id="search-input" placeholder="Search tasks…" autocomplete="off">
    </div>
  </header>

  <div class="duration-row" id="duration-row"></div>
  <div class="add-row">
    <input type="text" id="task-input" placeholder="What needs doing?" autocomplete="off">
    <button class="icon-btn" id="camera-btn" title="Photograph your whiteboard">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
    <button class="icon-btn primary" id="add-btn" title="Add task">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <input type="file" id="camera-input" accept="image/*" capture="environment">
  </div>

  <div id="error-slot"></div>
  <div id="main-content">
    <div class="loading-state"><div class="spinner"></div>Loading your board…</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast-slot" id="toast-slot"></div>

<script>
/* =====================================================================
   CONFIG
   ===================================================================== */
const POCKETBASE_URL = "https://pocketbase-production-2a23.up.railway.app";
const EXTRACT_BACKEND_URL = "https://YOUR-BOARD-BACKEND.up.railway.app";
const COLLECTION = "task_manager";
const ARCHIVE_AFTER_DAYS = 7;
const QUEUE_KEY = "board-pending-queue";

const HOUR = 60*60*1000, DAY = 24*HOUR, WEEK = 7*DAY;
const DURATIONS = {
  '7h': { unitMs: HOUR, cap: 7, suffix: 'h' },
  '7d': { unitMs: DAY,  cap: 7, suffix: 'd' },
  '7w': { unitMs: WEEK, cap: 7, suffix: 'w' }
};
/* ===================================================================== */

const pb = new PocketBase(POCKETBASE_URL);
let tasks = [];
let loaded = false;
let doneOpen = false;
let editingId = null;
let addingSubtaskFor = null;
let sortableInstance = null;
let toastTimer = null;
let toastCommit = null;
let toastUndo = null;
let searchQuery = '';
let prevOpenCount = null;
let sortableDragActive = false;
let selectedDuration = localStorage.getItem('board-selected-duration') || '7d';

/* --- Lane stats --- */
function computeLaneStats(){
  const stats = {};
  Object.keys(DURATIONS).forEach(key=>{
    const doneInLane = tasks.filter(t => t.done && t.duration === key && t.dueAt && t.completedAt);
    const onTime = doneInLane.filter(t => new Date(t.completedAt) <= new Date(t.dueAt)).length;
    stats[key] = { total: doneInLane.length, onTime, overdue: doneInLane.length - onTime };
  });
  return stats;
}
function renderStatsModal(){
  const stats = computeLaneStats();
  const rows = Object.keys(DURATIONS).map(key=>{
    const s = stats[key];
    if(!s.total){
      return `<div style="margin-bottom:16px;"><div style="font-weight:700;font-size:14px;margin-bottom:4px;">${key} lane</div><div style="font-size:13px;color:var(--ink-soft);">No completions in the last ~${ARCHIVE_AFTER_DAYS} days yet.</div></div>`;
    }
    const pct = Math.round((s.onTime / s.total) * 100);
    const barColor = pct >= 70 ? 'var(--marker-green)' : (pct >= 40 ? '#D69A00' : 'var(--marker-red)');
    return `
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-bottom:6px;">
          <span>${key} lane</span><span>${pct}% on time</span>
        </div>
        <div style="height:6px;border-radius:4px;background:var(--paper-line);overflow:hidden;margin-bottom:6px;">
          <div style="height:100%;width:${pct}%;background:${barColor};"></div>
        </div>
        <div style="font-size:12.5px;color:var(--ink-soft);">${s.onTime} on time · ${s.overdue} overdue · ${s.total} total</div>
      </div>`;
  }).join('');
  openModal(`
    <h2>Lane stats</h2>
    <p class="m-sub">Based on tasks completed in roughly the last ${ARCHIVE_AFTER_DAYS} days — older completions get quietly archived off the board.</p>
    ${rows}
    <div class="modal-actions"><button class="btn solid" onclick="closeModal()">Close</button></div>
  `);
}
document.getElementById('stats-toggle').addEventListener('click', renderStatsModal);

/* --- Toast / undo --- */
function showToast(message, undoFn, commitFn, duration=5000){
  if(toastTimer){ clearTimeout(toastTimer); if(toastCommit) toastCommit(); }
  toastCommit = commitFn; toastUndo = undoFn;
  document.getElementById('toast-slot').innerHTML = `<div class="toast">${escapeHtml(message)}<button onclick="handleToastUndo()">Undo</button></div>`;
  toastTimer = setTimeout(()=>{
    document.getElementById('toast-slot').innerHTML = '';
    if(toastCommit) toastCommit();
    toastCommit = null; toastTimer = null;
  }, duration);
}
function handleToastUndo(){
  if(toastTimer){ clearTimeout(toastTimer); toastTimer = null; }
  document.getElementById('toast-slot').innerHTML = '';
  if(toastUndo) toastUndo();
  toastCommit = null;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}
function highlightMatch(text){
  if(!searchQuery) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const escapedQuery = escapeHtml(searchQuery).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(escapedQuery, 'ig'), (m) => `<mark>${m}</mark>`);
}
function getOrderValue(t){
  return (typeof t.order === 'number' && t.order !== 0) ? t.order : -new Date(t.created).getTime();
}
function todaysDoneCount(){
  const start = new Date(); start.setHours(0,0,0,0);
  return tasks.filter(t => t.done && t.completedAt && new Date(t.completedAt) >= start).length;
}

/* --- Duration lanes --- */
function computeDueAt(durationKey){
  const conf = DURATIONS[durationKey];
  const now = new Date();
  if(durationKey === '7h' && now.getHours() >= 22){
    const start = new Date(now);
    start.setDate(start.getDate() + 1);
    start.setHours(7, 0, 0, 0);
    return new Date(start.getTime() + 7 * conf.unitMs).toISOString();
  }
  return new Date(now.getTime() + 7 * conf.unitMs).toISOString();
}

function countOpenByDuration(key){
  return tasks.filter(t => !t.done && t.duration === key).length;
}
function renderDurationPicker(){
  const html = Object.keys(DURATIONS).map(key=>{
    const conf = DURATIONS[key];
    const count = countOpenByDuration(key);
    const isActive = key === selectedDuration;
    const isFull = count >= conf.cap;
    return `<button class="duration-pill ${isActive?'active':''} ${isFull?'full':''}" onclick="selectDuration('${key}')">${key}<span>${count}/${conf.cap}</span></button>`;
  }).join('');
  document.getElementById('duration-row').innerHTML = html;
}
function selectDuration(key){
  selectedDuration = key;
  localStorage.setItem('board-selected-duration', key);
  render();
}
function formatCountdown(t){
  const conf = DURATIONS[t.duration];
  if(!conf || !t.dueAt) return null;
  const dueDate = new Date(t.dueAt);
  const remainMs = dueDate.getTime() - Date.now();
  let text, state;
  if(remainMs <= 0){
    text = 'Overdue';
    state = 'overdue';
  } else {
    const unitsLeft = Math.ceil(remainMs / conf.unitMs);
    text = `${unitsLeft}${conf.suffix} left`;
    state = remainMs <= conf.unitMs ? 'warning' : 'normal';
  }
  if(t.duration === '7w' || t.duration === '7d'){
    const dateLabel = dueDate.toLocaleDateString(undefined, { weekday:'short', day:'numeric', month:'short' });
    text += ` · lands ${dateLabel}`;
  }
  return { text, state };
}
function updateCountdownDisplays(){
  document.querySelectorAll('.task[data-id]').forEach(el=>{
    const t = tasks.find(x=>x.id===el.dataset.id);
    if(!t || t.done) return;
    const cd = formatCountdown(t);
    el.classList.remove('warning','overdue');
    if(!cd) return;
    const cdEl = el.querySelector('.countdown');
    if(cdEl) cdEl.textContent = cd.text;
    if(cd.state==='warning') el.classList.add('warning');
    if(cd.state==='overdue') el.classList.add('overdue');
  });
  const focusEl = document.querySelector('.focus-card');
  if(focusEl){
    const focusTask = tasks.find(t=>t.focus && !t.done);
    if(focusTask){
      const cd = formatCountdown(focusTask);
      const cdEl = focusEl.querySelector('.countdown');
      if(cd && cdEl){ cdEl.textContent = cd.text; cdEl.className = `countdown ${cd.state}`; }
    }
  }
}

function checkElevenPM(){
  const now = new Date();
  if(now.getHours() === 23){
    const todayKey = 'board-reminder-' + now.toISOString().slice(0,10);
    if(!localStorage.getItem(todayKey)){
      localStorage.setItem(todayKey, '1');
      showElevenPmPrompt();
    }
  }
}

    <h2>11pm check-in</h2>

  `);
}

/* --- Confetti --- */
function fireConfetti(){
  const colors = ['#2B5FA8','#2E8B4F','#E3B341','#8E6FCB','#4FA8C9'];
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;';
  document.body.appendChild(container);
  for(let i=0;i<30;i++){
    const piece = document.createElement('div');
    const color = colors[i % colors.length];
    const left = Math.random()*100;
    const delay = Math.random()*0.15;
    const duration = 1.1 + Math.random()*0.7;
    const rotate = (Math.random()*360)|0;
    const w = 6 + Math.random()*5, h = w*0.4;
    piece.className = 'confetti-piece';
    piece.style.cssText += `left:${left}%; width:${w}px; height:${h}px; background:${color}; opacity:0.95; transform:rotate(${rotate}deg); animation: confetti-fall ${duration}s ease-in ${delay}s forwards;`;
    container.appendChild(piece);
  }
  setTimeout(()=> container.remove(), 2300);
}

/* --- Weekly streak --- */
function renderStreak(){
  const strip = document.getElementById('streak-strip');
  let html = '';
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
    const next = new Date(d); next.setDate(d.getDate()+1);
    const filled = tasks.some(t => t.completedAt && new Date(t.completedAt) >= d && new Date(t.completedAt) < next);
    const label = d.toLocaleDateString(undefined, { weekday: 'narrow' });
    html += `<div class="streak-day"><div class="streak-dot ${filled?'filled':''} ${i===0?'today':''}"></div><span>${label}</span></div>`;
  }
  strip.innerHTML = html;
}

/* --- Offline queue --- */
function loadQueue(){ try{ return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); }catch(e){ return []; } }
function saveQueue(q){ localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }

async function flushQueue(){
  const queue = loadQueue();
  if(!queue.length) return;
  const remaining = [];
  for(const item of queue){
    try{
      const record = await pb.collection(COLLECTION).create(item.payload);
      tasks = tasks.map(t => t.id === item.localId ? record : t);
    }catch(e){
      remaining.push(item);
    }
  }
  saveQueue(remaining);
  render();
}
window.addEventListener('online', flushQueue);

async function loadTasks(){
  try{
    const records = await pb.collection(COLLECTION).getFullList({ sort: '-created' });
    tasks = records;
    loaded = true;
    setSyncStatus(true, 'Synced');
    render();
    subscribeRealtime();
    pruneOldDone();
    flushQueue();
    checkElevenPM();
  }catch(e){
    setSyncStatus(false, "Can't connect — check your setup");
    loaded = true;
    render();
  }
}

async function pruneOldDone(){
  const cutoff = Date.now() - ARCHIVE_AFTER_DAYS * 24 * 60 * 60 * 1000;
  const stale = tasks.filter(t => t.done && t.completedAt && new Date(t.completedAt).getTime() < cutoff);
  if(!stale.length) return;
  await Promise.all(stale.map(t => pb.collection(COLLECTION).delete(t.id).catch(()=>{})));
  tasks = tasks.filter(t => !stale.find(s => s.id === t.id));
  render();
}

function subscribeRealtime(){
  pb.collection(COLLECTION).subscribe('*', (e)=>{
    if(editingId) return;
    if(e.action === 'create'){
      if(!tasks.find(t=>t.id===e.record.id)) tasks.unshift(e.record);
    } else if(e.action === 'update'){
      tasks = tasks.map(t=> t.id===e.record.id ? e.record : t);
    } else if(e.action === 'delete'){
      tasks = tasks.filter(t=>t.id!==e.record.id);
    }
    render();
  }).catch(()=>{});
}

async function addTask(text){
  const trimmed = text.trim();
  if(!trimmed) return;
  const durationKey = selectedDuration;
  const conf = DURATIONS[durationKey];
  if(countOpenByDuration(durationKey) >= conf.cap){
    showError(`Your ${durationKey} lane is full (${conf.cap}/${conf.cap}) — finish or remove one first.`);
    return;
  }
  const openOrders = tasks.filter(t=>!t.done).map(getOrderValue);
  const newOrder = openOrders.length ? Math.min(...openOrders) - 1 : -Date.now();
  const dueAt = computeDueAt(durationKey);
  const payload = { text: trimmed, done:false, completedAt:null, order:newOrder, focus:false, duration:durationKey, dueAt, subtask:[] };
  try{
    const record = await pb.collection(COLLECTION).create(payload);
    if(!tasks.find(t=>t.id===record.id)) tasks.unshift(record);
    render();
  }catch(e){
    const localId = 'local-'+Date.now()+'-'+Math.random().toString(36).slice(2,7);
    const localTask = { id: localId, ...payload, created: new Date().toISOString(), _pending:true };
    tasks.unshift(localTask);
    const queue = loadQueue();
    queue.push({ localId, payload });
    saveQueue(queue);
    render();
    showError("Offline — saved on this device, will sync once you're back online.");
  }
}

async function toggleTask(id){
  const t = tasks.find(t=>t.id===id);
  if(!t) return;
  if(t._pending){ showError("Still syncing this one — try again in a moment."); return; }
  const newDone = !t.done;
  const payload = { done: newDone, completedAt: newDone ? new Date().toISOString() : null };
  if(newDone && t.focus) payload.focus = false;
  try{
    const record = await pb.collection(COLLECTION).update(id, payload);
    tasks = tasks.map(x=> x.id===id ? record : x);
    render();
    if(newDone){
      showToast('Nice — ticked off', () => { toggleTask(id); }, null, 4000);
    }
  }catch(e){
    showError("Couldn't update that task — check your connection.");
  }
}

async function deleteTask(id){
  const removed = tasks.find(t=>t.id===id);
  if(!removed) return;
  tasks = tasks.filter(t=>t.id!==id);
  render();
  showToast(
    'Task deleted',
    () => {
      if(!tasks.find(t=>t.id===removed.id)){
        tasks.unshift(removed);
        if(removed._pending){
          const q = loadQueue();
          q.push({ localId: removed.id, payload: { text:removed.text, done:removed.done, completedAt:removed.completedAt, order:removed.order, focus:removed.focus, duration:removed.duration, dueAt:removed.dueAt } });
          saveQueue(q);
        }
        render();
      }
    },
    async () => {
      if(removed._pending){
        saveQueue(loadQueue().filter(item=>item.localId!==id));
      } else {
        try{ await pb.collection(COLLECTION).delete(id); }catch(e){}
      }
    }
  );
}

function openDurationMenu(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  const rows = Object.keys(DURATIONS).map(key=>{
    const conf = DURATIONS[key];
    const count = countOpenByDuration(key);
    const isCurrent = key === t.duration;
    const full = !isCurrent && count >= conf.cap;
    return `<button class="btn ${isCurrent?'solid':'ghost'}" style="margin-bottom:8px;width:100%;" ${full?'disabled':''} onclick="moveDuration('${id}','${key}')">${key}${isCurrent ? ' (current)' : ` — ${count}/${conf.cap} open`}</button>`;
  }).join('');
  openModal(`
    <h2>Move this task</h2>
    <p class="m-sub">Pick a new lane. It restarts with a fresh countdown from full time in that lane.</p>
    <div style="display:flex;flex-direction:column;">${rows}</div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancel</button></div>
  `);
}
async function moveDuration(id, newKey){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  if(t.duration === newKey){ closeModal(); return; }
  const conf = DURATIONS[newKey];
  if(countOpenByDuration(newKey) >= conf.cap){
    showError(`Your ${newKey} lane is full (${conf.cap}/${conf.cap}) — finish or remove one first.`);
    return;
  }
  const dueAt = computeDueAt(newKey);
  try{
    const record = await pb.collection(COLLECTION).update(id, { duration: newKey, dueAt });
    tasks = tasks.map(x=> x.id===id ? record : x);
    closeModal();
    render();
  }catch(e){
    showError("Couldn't move that task — check your connection.");
  }
}

async function setFocus(id){
  const current = tasks.find(t=>t.focus);
  const jobs = [];
  if(current && current.id !== id) jobs.push(pb.collection(COLLECTION).update(current.id, { focus:false }).catch(()=>{}));
  jobs.push(pb.collection(COLLECTION).update(id, { focus:true }).catch(()=>{}));
  await Promise.all(jobs);
  tasks = tasks.map(t=>{
    if(t.id===id) return {...t, focus:true};
    if(current && t.id===current.id) return {...t, focus:false};
    return t;
  });
  render();
}
async function unsetFocus(id){
  try{ await pb.collection(COLLECTION).update(id, { focus:false }); }catch(e){}
  tasks = tasks.map(t=> t.id===id ? {...t, focus:false} : t);
  render();
}

function genSubId(){ return 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

async function addSubtask(taskId, text){
  const trimmed = text.trim();
  if(!trimmed) { render(); return; }
  const t = tasks.find(x=>x.id===taskId);
  if(!t) return;
  if(t.duration === '7h'){ showError("Subtasks aren't available for 7h tasks."); render(); return; }
  const subs = Array.isArray(t.subtask) ? t.subtask.slice() : [];
  if(subs.length >= 3){ render(); return; }
  subs.push({ id: genSubId(), text: trimmed, done: false });
  try{
    const record = await pb.collection(COLLECTION).update(taskId, { subtask: subs });
    tasks = tasks.map(x=> x.id===taskId ? record : x);
  }catch(e){
    showError("Couldn't save that subtask — check your connection.");
  }
  render();
}
async function toggleSubtask(taskId, subId){
  const t = tasks.find(x=>x.id===taskId);
  if(!t) return;
  const subs = (t.subtask||[]).map(s => s.id===subId ? { ...s, done: !s.done } : s);
  try{
    const record = await pb.collection(COLLECTION).update(taskId, { subtask: subs });
    tasks = tasks.map(x=> x.id===taskId ? record : x);
  }catch(e){
    showError("Couldn't update that subtask — check your connection.");
  }
  render();
}
async function deleteSubtask(taskId, subId){
  const t = tasks.find(x=>x.id===taskId);
  if(!t) return;
  const subs = (t.subtask||[]).filter(s => s.id!==subId);
  try{
    const record = await pb.collection(COLLECTION).update(taskId, { subtask: subs });
    tasks = tasks.map(x=> x.id===taskId ? record : x);
  }catch(e){
    showError("Couldn't remove that subtask — check your connection.");
  }
  render();
}
function startAddSubtask(taskId){
  addingSubtaskFor = taskId;
  render();
  setTimeout(()=>{ const inp = document.getElementById('subtask-input-'+taskId); if(inp) inp.focus(); }, 0);
}
function handleSubtaskKey(e, taskId){
  if(e.key === 'Enter'){ e.target.blur(); }
  else if(e.key === 'Escape'){ addingSubtaskFor = null; render(); }
}
function commitSubtaskBlur(e, taskId){
  const val = e.target.value;
  addingSubtaskFor = null;
  addSubtask(taskId, val);
}
function subtasksHtml(t, allowAdd){
  const subs = Array.isArray(t.subtask) ? t.subtask : [];
  if(!subs.length && !allowAdd) return '';
  const rows = subs.map(s => `
    <div class="subtask-row">
      <div class="subtask-check ${s.done?'done':''}" onclick="toggleSubtask('${t.id}','${s.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="subtask-text ${s.done?'done':''}">${escapeHtml(s.text)}</div>
      <div class="subtask-del" onclick="deleteSubtask('${t.id}','${s.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>`).join('');
  const addRow = !allowAdd ? '' : (addingSubtaskFor === t.id
    ? `<div class="subtask-row"><input type="text" class="subtask-input" id="subtask-input-${t.id}" placeholder="Subtask…" autofocus onkeydown="handleSubtaskKey(event,'${t.id}')" onblur="commitSubtaskBlur(event,'${t.id}')"></div>`
    : (subs.length < 3 ? `<button class="subtask-add" onclick="event.stopPropagation(); startAddSubtask('${t.id}')">+ Subtask</button>` : ''));
  return `<div class="subtasks">${rows}${addRow}</div>`;
}

function startEdit(id){
  const t = tasks.find(t=>t.id===id);
  if(t && t._pending) return;
  editingId = id;
  render();
  setTimeout(()=>{ const inp = document.getElementById('edit-input-'+id); if(inp){ inp.focus(); inp.select(); } }, 0);
}
async function commitEdit(id, value){
  const trimmed = value.trim();
  editingId = null;
  const t = tasks.find(t=>t.id===id);
  if(!trimmed || !t || t.text === trimmed){ render(); return; }
  try{
    const record = await pb.collection(COLLECTION).update(id, { text: trimmed });
    tasks = tasks.map(x=> x.id===id ? record : x);
  }catch(e){
    showError("Couldn't save the edit — check your connection.");
  }
  render();
}
function handleEditKey(e, id){
  if(e.key === 'Enter'){ e.target.blur(); }
  else if(e.key === 'Escape'){ editingId = null; render(); }
}

function render(){
  const el = document.getElementById('main-content');
  if(!loaded) return;

  document.getElementById('today-count-text').textContent = ` · ${todaysDoneCount()} done today`;
  renderStreak();
  renderDurationPicker();

  const allOpen = tasks.filter(t=>!t.done).sort((a,b)=> getOrderValue(a) - getOrderValue(b));
  const allDone = tasks.filter(t=>t.done).sort((a,b)=> new Date(b.completedAt||0) - new Date(a.completedAt||0));

  if(prevOpenCount !== null && prevOpenCount > 0 && allOpen.length === 0 && tasks.length > 0){
    fireConfetti();
  }
  prevOpenCount = allOpen.length;

  if(tasks.length===0){
    el.innerHTML = `
      <div class="empty">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <div class="t">Blank board.</div>
        <div class="s">Type a task above, or snap a photo of your whiteboard to pull everything across.</div>
      </div>`;
    return;
  }

  const focusTask = allOpen.find(t=>t.focus) || null;
  let restOpen = focusTask ? allOpen.filter(t=>t.id!==focusTask.id) : allOpen;
  const preLaneCount = restOpen.length;
  restOpen = restOpen.filter(t => !t.duration || t.duration === selectedDuration);
  let doneList = allDone;
  const showFocusCard = focusTask && !searchQuery;

  if(searchQuery){
    restOpen = restOpen.filter(t => t.text.toLowerCase().includes(searchQuery));
    doneList = doneList.filter(t => t.text.toLowerCase().includes(searchQuery));
  }

  let html = '';
  if(showFocusCard) html += focusCard(focusTask);

  if(restOpen.length){
    html += `<div class="task-list">` + restOpen.map(taskRow).join('') + `</div>`;
  } else if(searchQuery){
    html += `<div class="empty"><div class="t">No matches.</div><div class="s">Nothing open matches "${escapeHtml(searchQuery)}".</div></div>`;
  } else if(preLaneCount > 0){
    html += `<div class="empty"><div class="t">Nothing in ${selectedDuration}.</div><div class="s">You've got open tasks in other lanes — tap a different pill above to see them.</div></div>`;
  } else if(!showFocusCard){
    html += `<div class="empty"><div class="t">All clear.</div><div class="s">Everything on the board is ticked off.</div></div>`;
  }

  if(doneList.length){
    html += `
      <div class="done-toggle ${doneOpen?'open':''}" onclick="doneOpen=!doneOpen; render();">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        Done (${doneList.length})
      </div>
      <div class="done-list ${doneOpen?'open':''}">${doneList.map(taskRow).join('')}</div>
    `;
  }
  el.innerHTML = html;
  if(!searchQuery) attachSortable();
}

function focusCard(t){
  const textHtml = t.id === editingId
    ? `<input type="text" class="edit-input" id="edit-input-${t.id}" value="${escapeHtml(t.text)}" onkeydown="handleEditKey(event,'${t.id}')" onblur="commitEdit('${t.id}', this.value)">`
    : `<div class="focus-text" onclick="startEdit('${t.id}')">${escapeHtml(t.text)}</div>`;
  const cd = formatCountdown(t);
  const cdHtml = cd ? `<div class="countdown ${cd.state}">${cd.text}</div>` : '';
  const tagHtml = (t.duration && DURATIONS[t.duration]) ? `<button class="duration-tag" onclick="event.stopPropagation(); openDurationMenu('${t.id}')">${t.duration}</button>` : '';
  const metaHtml = (cdHtml || tagHtml) ? `<div class="task-meta">${cdHtml}${tagHtml}</div>` : '';
  return `
    <div class="focus-card">
      <div class="focus-label">${ICON_STAR_FILLED} Today's focus</div>
      <div class="focus-row">
        <div class="check" onclick="toggleTask('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="focus-text-wrap">${textHtml}${metaHtml}${subtasksHtml(t, t.duration !== '7h')}</div>
        <div class="focus-unpin" onclick="unsetFocus('${t.id}')" title="Unpin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
      </div>
    </div>`;
}

function taskRow(t){
  const textHtml = t.id === editingId
    ? `<input type="text" class="edit-input" id="edit-input-${t.id}" value="${escapeHtml(t.text)}" onkeydown="handleEditKey(event,'${t.id}')" onblur="commitEdit('${t.id}', this.value)">`
    : `<div class="task-text" onclick="startEdit('${t.id}')">${highlightMatch(t.text)}</div>`;
  const pendingLabel = t._pending ? `<div class="pending-label">Waiting to sync…</div>` : '';
  const cd = !t.done ? formatCountdown(t) : null;
  const cdHtml = cd ? `<div class="countdown ${cd.state}">${cd.text}</div>` : '';
  const tagHtml = (!t.done && t.duration && DURATIONS[t.duration]) ? `<button class="duration-tag" onclick="event.stopPropagation(); openDurationMenu('${t.id}')">${t.duration}</button>` : '';
  const metaHtml = (cdHtml || tagHtml) ? `<div class="task-meta">${cdHtml}${tagHtml}</div>` : '';
  const pinHtml = t.done ? '' : `<div class="task-pin" onclick="setFocus('${t.id}')" title="Set as today's focus">${ICON_STAR_OUTLINE}</div>`;
  const stateClasses = [t.done?'done':'', t._pending?'pending':'', cd&&cd.state==='warning'?'warning':'', cd&&cd.state==='overdue'?'overdue':''].filter(Boolean).join(' ');

  return `
    <div class="task-outer">
      <div class="swipe-bg complete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Done</div>
      <div class="swipe-bg delete">Delete<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></div>
      <div class="task ${stateClasses}" data-id="${t.id}">
        <div class="drag-handle"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg></div>
        <div class="check" onclick="toggleTask('${t.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="task-text-wrap">${textHtml}${metaHtml}${pendingLabel}${subtasksHtml(t, !t.done && t.duration !== '7h')}</div>
        ${pinHtml}
        <div class="task-del" onclick="deleteTask('${t.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
    </div>`;
}

function attachSortable(){
  const list = document.querySelector('.task-list');
  if(sortableInstance){ sortableInstance.destroy(); sortableInstance = null; }
  if(!list || typeof Sortable === 'undefined') return;
  sortableInstance = new Sortable(list, {
    handle: '.drag-handle',
    animation: 0,
    onStart: () => { sortableDragActive = true; swipeState = null; },
    onEnd: async () => {
      sortableDragActive = false;
      const ids = Array.from(list.querySelectorAll('.task')).map(elm => elm.dataset.id);
      const updates = ids.map((id, idx) => {
        const t = tasks.find(x=>x.id===id);
        if(t) t.order = idx;
        return pb.collection(COLLECTION).update(id, { order: idx }).catch(()=>{});
      });
      await Promise.all(updates);
    }
  });
}

/* --- Swipe gestures --- */
let swipeState = null;
const mainContentEl = document.getElementById('main-content');
mainContentEl.addEventListener('pointerdown', (e)=>{
  if(e.pointerType && e.pointerType !== 'touch' && e.pointerType !== 'pen') return;
  if(sortableDragActive) return;
  const taskEl = e.target.closest('.task');
  if(!taskEl) return;
  if(e.target.closest('.drag-handle') || e.target.closest('.check') || e.target.closest('.task-del') || e.target.closest('.task-pin') || e.target.closest('.edit-input') || e.target.closest('.duration-tag') || e.target.closest('.subtasks')) return;
  swipeState = { id: taskEl.dataset.id, startX: e.clientX, startY: e.clientY, el: taskEl, dragging: false };
});
mainContentEl.addEventListener('pointermove', (e)=>{
  if(sortableDragActive){ swipeState = null; return; }
  if(!swipeState) return;
  const dx = e.clientX - swipeState.startX;
  const dy = e.clientY - swipeState.startY;
  if(!swipeState.dragging){
    if(Math.abs(dx) > 14 && Math.abs(dx) > Math.abs(dy) * 1.6){ swipeState.dragging = true; swipeState.el.style.transition = 'none'; }
    else if(Math.abs(dy) > 10){ swipeState = null; return; }
  }
  if(swipeState && swipeState.dragging){
    const clamped = Math.max(-140, Math.min(140, dx));
    swipeState.el.style.transform = `translateX(${clamped}px)`;
  }
});
function endSwipe(e){
  if(sortableDragActive) return;
  if(!swipeState) return;
  if(swipeState.dragging){
    const dx = e.clientX - swipeState.startX;
    swipeState.el.style.transition = 'transform 0.18s ease';
    if(dx > 90){
      swipeState.el.style.transform = `translateX(180px)`;
      const id = swipeState.id; setTimeout(()=> toggleTask(id), 130);
    } else if(dx < -90){
      swipeState.el.style.transform = `translateX(-180px)`;
      const id = swipeState.id; setTimeout(()=> deleteTask(id), 130);
    } else {
      swipeState.el.style.transform = `translateX(0)`;
    }
  }
  swipeState = null;
}
mainContentEl.addEventListener('pointerup', endSwipe);
mainContentEl.addEventListener('pointercancel', endSwipe);

document.getElementById('add-btn').addEventListener('click', ()=>{
  const input = document.getElementById('task-input');
  addTask(input.value); input.value=''; input.focus();
});
document.getElementById('task-input').addEventListener('keydown', (e)=>{
  if(e.key==='Enter'){ addTask(e.target.value); e.target.value=''; }
});

document.getElementById('camera-btn').addEventListener('click', ()=>{
  document.getElementById('camera-input').click();
});
document.getElementById('camera-input').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = '';
  openModal(`<div class="loading-state"><div class="spinner"></div>Reading the board…</div>`);
  try{
    const base64 = await fileToBase64(file);
    const mediaType = file.type || 'image/jpeg';
    const extracted = await extractTasksFromImage(base64, mediaType);
    if(extracted.length===0){
      openModal(`<h2>Nothing found</h2><p class="m-sub">Couldn't make out any tasks in that photo. Try getting closer or with better lighting.</p><div class="modal-actions"><button class="btn solid" onclick="closeModal()">Close</button></div>`);
    } else {
      renderReviewModal(extracted);
    }
  }catch(err){
    openModal(`<h2>Something went wrong</h2><p class="m-sub">Couldn't read that photo. Check your connection and try again.</p><div class="modal-actions"><button class="btn solid" onclick="closeModal()">Close</button></div>`);
  }
});
function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = ()=> reject(new Error('read failed'));
    reader.readAsDataURL(file);
  });
}
async function extractTasksFromImage(base64, mediaType){
  const response = await fetch(`${EXTRACT_BACKEND_URL}/extract-tasks`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image: base64, mediaType })
  });
  if(!response.ok) throw new Error('backend error');
  const data = await response.json();
  return Array.isArray(data.tasks) ? data.tasks : [];
}
function renderReviewModal(items){
  const rows = items.map((text, i)=>`
    <div class="review-item">
      <input type="checkbox" checked data-idx="${i}">
      <input type="text" value="${escapeHtml(text)}" data-idx="${i}">
    </div>`).join('');
  openModal(`
    <h2>Found ${items.length} task${items.length===1?'':'s'}</h2>
    <p class="m-sub">Uncheck anything that isn't a real task, edit the wording if needed, then add. They'll use the ${selectedDuration} lane currently selected.</p>
    <div id="review-list">${rows}</div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn solid" id="confirm-add-btn">Add tasks</button>
    </div>`);
  document.getElementById('confirm-add-btn').addEventListener('click', async ()=>{
    const list = document.getElementById('review-list');
    const checks = list.querySelectorAll('input[type="checkbox"]');
    const texts = list.querySelectorAll('input[type="text"]');
    let skipped = 0;
    for(let i=0;i<checks.length;i++){
      if(!checks[i].checked) continue;
      const conf = DURATIONS[selectedDuration];
      if(countOpenByDuration(selectedDuration) >= conf.cap){ skipped++; continue; }
      await addTask(texts[i].value);
    }
    closeModal();
    if(skipped>0) showError(`Added what fit — ${skipped} skipped, your ${selectedDuration} lane is full.`);
  });
}
function openModal(html){ document.getElementById('modal-content').innerHTML = html; document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });

setInterval(()=>{ updateCountdownDisplays(); checkElevenPM(); }, 60000);

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

loadTasks();
</script>
